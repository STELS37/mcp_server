name: Auto Signal

on:
  push:
  pull_request:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - name: Signal heartbeat
        run: |
          echo "repo=${{ github.repository }}"
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u
